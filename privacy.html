<style>

h1{font-size:clamp(26px,4.5vw,38px);font-weight:800;margin:0;letter-spacing:-.01em}

.back{display:inline-flex;margin-top:48px;padding:13px 26px;border:1px solid var(--line);border-radius:10px;
 color:var(--muted2);font-weight:800;font-size:13.5px;transition:.22s}
.back:hover{border-color:var(--gold);color:var(--ink);text-decoration:none}
html[dir=rtl] body{direction:rtl;text-align:right}

<script>
var P={"en": {"title": "Privacy Policy — Atmos Villas", "h": "Privacy Policy", "upd": "Last updated: 17 July 2026", "s": [["Who we are", "Atmos Villas is a villa development project in Hin Kong, Koh Phangan, Surat Thani, Thailand. Contact: atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["What data we collect", "When you send the enquiry form we collect your name, phone number and preferred contact method. When you write to us on WhatsApp, Telegram or email we receive the contact details and messages you send. Our website also uses cookies and similar technologies, including Meta Pixel, which automatically collects device and usage data such as pages viewed, buttons clicked, browser type and approximate location."], ["How we use it", "We use your contact details only to reply to your enquiry and discuss the villas. We use Meta Pixel data to measure how our advertising works and to show relevant ads on Facebook and Instagram (retargeting)."], ["Who we share it with", "Form submissions are delivered to us via Cloudflare (hosting of the form endpoint) and Telegram (message delivery). Pixel data is shared with Meta Platforms, Inc., which processes it under its own Data Policy. We do not sell your personal data and do not share it with anyone else."], ["How long we keep it", "We keep enquiry details for as long as needed to answer you and discuss a possible purchase, after which they are deleted."], ["Your rights", "You can ask us at any time to show, correct or delete the data we hold about you, or to stop contacting you. Write to atmos.villas@gmail.com — we reply within 30 days. You can also limit cookie tracking in your browser settings and manage ad preferences in your Facebook settings."], ["Changes", "If this policy changes, the new version will be published on this page with a new date."]], "back": "Back to the site"}, "ru": {"title": "Политика конфиденциальности — Atmos Villas", "h": "Политика конфиденциальности", "upd": "Обновлено: 17 июля 2026", "s": [["Кто мы", "Atmos Villas — проект строительства вилл в Хин Конге, Ко Пханган, Сурат Тани, Таиланд. Контакты: atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["Какие данные мы собираем", "Когда вы отправляете форму заявки, мы получаем имя, номер телефона и предпочтительный способ связи. Когда вы пишете нам в WhatsApp, Telegram или на почту — контакты и сообщения, которые вы отправляете. Сайт также использует cookies и похожие технологии, включая Meta Pixel, который автоматически собирает данные об устройстве и поведении: просмотренные страницы, нажатые кнопки, тип браузера, примерное местоположение."], ["Зачем мы их используем", "Контактные данные — только чтобы ответить на заявку и обсудить виллы. Данные пикселя — чтобы измерять эффективность рекламы и показывать релевантные объявления в Facebook и Instagram (ретаргетинг)."], ["Кому передаются данные", "Заявки с формы доставляются нам через Cloudflare (обработка формы) и Telegram (доставка сообщения). Данные пикселя передаются Meta Platforms, Inc. и обрабатываются по её политике данных. Мы не продаём ваши данные и не передаём их никому другому."], ["Сколько храним", "Данные заявки хранятся, пока идёт общение и обсуждение возможной покупки, после чего удаляются."], ["Ваши права", "Вы можете в любой момент запросить, исправить или удалить свои данные, а также попросить больше не связываться с вами. Пишите на atmos.villas@gmail.com — ответим в течение 30 дней. Отслеживание cookies можно ограничить в настройках браузера, рекламные предпочтения — в настройках Facebook."], ["Изменения", "При изменении политики новая версия публикуется на этой странице с новой датой."]], "back": "Вернуться на сайт"}, "uk": {"title": "Політика конфіденційності — Atmos Villas", "h": "Політика конфіденційності", "upd": "Оновлено: 17 липня 2026", "s": [["Хто ми", "Atmos Villas — проєкт будівництва вілл у Хін Конгу, Ко Пханган, Сурат Тані, Таїланд. Контакти: atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["Які дані ми збираємо", "Коли ви надсилаєте форму заявки, ми отримуємо ім'я, номер телефону та бажаний спосіб зв'язку. Коли ви пишете нам у WhatsApp, Telegram або на пошту — контакти та повідомлення, які ви надсилаєте. Сайт також використовує cookies і подібні технології, зокрема Meta Pixel, який автоматично збирає дані про пристрій і поведінку: переглянуті сторінки, натиснуті кнопки, тип браузера, приблизне місцезнаходження."], ["Навіщо ми їх використовуємо", "Контактні дані — лише щоб відповісти на заявку та обговорити вілли. Дані пікселя — щоб вимірювати ефективність реклами та показувати релевантні оголошення у Facebook та Instagram (ретаргетинг)."], ["Кому передаються дані", "Заявки з форми доставляються нам через Cloudflare (обробка форми) і Telegram (доставка повідомлення). Дані пікселя передаються Meta Platforms, Inc. та обробляються за її політикою даних. Ми не продаємо ваші дані й не передаємо їх нікому іншому."], ["Скільки зберігаємо", "Дані заявки зберігаються, поки триває спілкування та обговорення можливої покупки, після чого видаляються."], ["Ваші права", "Ви можете будь-коли запросити, виправити або видалити свої дані, а також попросити більше не зв'язуватися з вами. Пишіть на atmos.villas@gmail.com — відповімо протягом 30 днів. Відстеження cookies можна обмежити в налаштуваннях браузера, рекламні вподобання — у налаштуваннях Facebook."], ["Зміни", "У разі зміни політики нова версія публікується на цій сторінці з новою датою."]], "back": "Повернутися на сайт"}, "de": {"title": "Datenschutzerklärung — Atmos Villas", "h": "Datenschutzerklärung", "upd": "Stand: 17. Juli 2026", "s": [["Wer wir sind", "Atmos Villas ist ein Villenbauprojekt in Hin Kong, Koh Phangan, Surat Thani, Thailand. Kontakt: atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["Welche Daten wir erheben", "Wenn Sie das Anfrageformular senden, erhalten wir Ihren Namen, Ihre Telefonnummer und den gewünschten Kontaktweg. Wenn Sie uns über WhatsApp, Telegram oder E-Mail schreiben, erhalten wir die von Ihnen gesendeten Kontaktdaten und Nachrichten. Unsere Website verwendet außerdem Cookies und ähnliche Technologien, darunter Meta Pixel, das automatisch Geräte- und Nutzungsdaten erfasst: besuchte Seiten, geklickte Buttons, Browsertyp, ungefährer Standort."], ["Wofür wir sie nutzen", "Kontaktdaten nutzen wir nur, um Ihre Anfrage zu beantworten und die Villen zu besprechen. Pixel-Daten nutzen wir, um die Wirkung unserer Werbung zu messen und relevante Anzeigen auf Facebook und Instagram zu zeigen (Retargeting)."], ["An wen wir sie weitergeben", "Formularanfragen erreichen uns über Cloudflare (Formular-Verarbeitung) und Telegram (Nachrichtenzustellung). Pixel-Daten werden an Meta Platforms, Inc. übermittelt und nach deren Datenrichtlinie verarbeitet. Wir verkaufen Ihre Daten nicht und geben sie an niemanden sonst weiter."], ["Wie lange wir sie speichern", "Anfragedaten speichern wir, solange die Kommunikation und die Besprechung eines möglichen Kaufs andauern; danach werden sie gelöscht."], ["Ihre Rechte", "Sie können jederzeit Auskunft, Berichtigung oder Löschung Ihrer Daten verlangen oder darum bitten, nicht mehr kontaktiert zu werden. Schreiben Sie an atmos.villas@gmail.com — wir antworten innerhalb von 30 Tagen. Cookie-Tracking können Sie in den Browsereinstellungen einschränken, Werbepräferenzen in den Facebook-Einstellungen verwalten."], ["Änderungen", "Bei Änderungen dieser Erklärung wird die neue Fassung mit neuem Datum auf dieser Seite veröffentlicht."]], "back": "Zurück zur Website"}, "fr": {"title": "Politique de confidentialité — Atmos Villas", "h": "Politique de confidentialité", "upd": "Mise à jour : 17 juillet 2026", "s": [["Qui nous sommes", "Atmos Villas est un projet de construction de villas à Hin Kong, Koh Phangan, Surat Thani, Thaïlande. Contact : atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["Les données que nous collectons", "Lorsque vous envoyez le formulaire, nous recevons votre nom, votre numéro de téléphone et le moyen de contact préféré. Lorsque vous nous écrivez sur WhatsApp, Telegram ou par e-mail, nous recevons les coordonnées et messages que vous envoyez. Le site utilise aussi des cookies et technologies similaires, dont Meta Pixel, qui collecte automatiquement des données d'appareil et d'usage : pages vues, boutons cliqués, type de navigateur, localisation approximative."], ["Comment nous les utilisons", "Vos coordonnées servent uniquement à répondre à votre demande et à discuter des villas. Les données du pixel servent à mesurer l'efficacité de notre publicité et à afficher des annonces pertinentes sur Facebook et Instagram (retargeting)."], ["Avec qui nous les partageons", "Les demandes du formulaire nous parviennent via Cloudflare (traitement du formulaire) et Telegram (livraison du message). Les données du pixel sont transmises à Meta Platforms, Inc. et traitées selon sa politique de données. Nous ne vendons pas vos données et ne les partageons avec personne d'autre."], ["Durée de conservation", "Les données de demande sont conservées pendant la durée des échanges et de la discussion d'un éventuel achat, puis supprimées."], ["Vos droits", "Vous pouvez à tout moment demander l'accès, la correction ou la suppression de vos données, ou demander à ne plus être contacté. Écrivez à atmos.villas@gmail.com — réponse sous 30 jours. Vous pouvez limiter les cookies dans votre navigateur et gérer vos préférences publicitaires dans les réglages Facebook."], ["Modifications", "En cas de modification, la nouvelle version sera publiée sur cette page avec une nouvelle date."]], "back": "Retour au site"}, "es": {"title": "Política de privacidad — Atmos Villas", "h": "Política de privacidad", "upd": "Actualizado: 17 de julio de 2026", "s": [["Quiénes somos", "Atmos Villas es un proyecto de construcción de villas en Hin Kong, Koh Phangan, Surat Thani, Tailandia. Contacto: atmos.villas@gmail.com, WhatsApp +66 656 352 972."], ["Qué datos recopilamos", "Al enviar el formulario recibimos su nombre, teléfono y el medio de contacto preferido. Al escribirnos por WhatsApp, Telegram o correo, recibimos los datos y mensajes que envía. El sitio también usa cookies y tecnologías similares, incluido Meta Pixel, que recopila automáticamente datos del dispositivo y de uso: páginas vistas, botones pulsados, tipo de navegador, ubicación aproximada."], ["Para qué los usamos", "Sus datos de contacto se usan solo para responder a su solicitud y hablar de las villas. Los datos del píxel se usan para medir la eficacia de nuestra publicidad y mostrar anuncios relevantes en Facebook e Instagram (retargeting)."], ["Con quién los compartimos", "Las solicitudes del formulario nos llegan a través de Cloudflare (procesamiento del formulario) y Telegram (entrega del mensaje). Los datos del píxel se comparten con Meta Platforms, Inc. y se procesan según su política de datos. No vendemos sus datos ni los compartimos con nadie más."], ["Cuánto tiempo los guardamos", "Los datos de la solicitud se conservan mientras dure la comunicación y la conversación sobre una posible compra; después se eliminan."], ["Sus derechos", "Puede pedir en cualquier momento ver, corregir o eliminar sus datos, o que dejemos de contactarle. Escriba a atmos.villas@gmail.com — respondemos en un plazo de 30 días. Puede limitar las cookies en su navegador y gestionar sus preferencias de anuncios en los ajustes de Facebook."], ["Cambios", "Si esta política cambia, la nueva versión se publicará en esta página con una nueva fecha."]], "back": "Volver al sitio"}, "he": {"title": "מדיניות פרטיות — Atmos Villas", "h": "מדיניות פרטיות", "upd": "עודכן: 17 ביולי 2026", "s": [["מי אנחנו", "Atmos Villas הוא פרויקט בניית וילות בהין קונג, קו פנגן, סוראט תאני, תאילנד. יצירת קשר: atmos.villas@gmail.com, וואטסאפ ‎+66 656 352 972."], ["אילו נתונים אנחנו אוספים", "כששולחים את טופס הפנייה אנו מקבלים שם, מספר טלפון ודרך הקשר המועדפת. כשכותבים לנו בוואטסאפ, בטלגרם או במייל — אנו מקבלים את הפרטים וההודעות שאתם שולחים. האתר משתמש גם בעוגיות ובטכנולוגיות דומות, כולל Meta Pixel, שאוסף אוטומטית נתוני מכשיר ושימוש: דפים שנצפו, כפתורים שנלחצו, סוג דפדפן ומיקום משוער."], ["למה אנחנו משתמשים בהם", "בפרטי הקשר אנו משתמשים רק כדי לענות לפנייה ולדבר על הווילות. בנתוני הפיקסל — כדי למדוד את יעילות הפרסום ולהציג מודעות רלוונטיות בפייסבוק ובאינסטגרם (ריטרגטינג)."], ["עם מי אנחנו חולקים אותם", "פניות מהטופס מגיעות אלינו דרך Cloudflare (עיבוד הטופס) ו-Telegram (מסירת ההודעה). נתוני הפיקסל מועברים ל-Meta Platforms, Inc. ומעובדים לפי מדיניות הנתונים שלה. אנחנו לא מוכרים את הנתונים שלכם ולא חולקים אותם עם אף אחד אחר."], ["כמה זמן אנחנו שומרים", "נתוני הפנייה נשמרים כל עוד נמשכת התקשורת והשיחה על רכישה אפשרית, ולאחר מכן נמחקים."], ["הזכויות שלכם", "אפשר בכל רגע לבקש לראות, לתקן או למחוק את הנתונים שלכם, או לבקש שנפסיק ליצור קשר. כתבו ל-atmos.villas@gmail.com — נענה תוך 30 יום. אפשר להגביל עוגיות בהגדרות הדפדפן ולנהל העדפות פרסום בהגדרות פייסבוק."], ["שינויים", "אם המדיניות תשתנה, הגרסה החדשה תפורסם בדף זה עם תאריך חדש."]], "back": "חזרה לאתר"}};
var HOME={"en": "index.html", "ru": "ru.html", "uk": "uk.html", "de": "de.html", "fr": "fr.html", "es": "es.html", "he": "he.html"};
function pick(){
  var s=null; try{s=localStorage.getItem('atmos_lang');}catch(e){}
  if(s&&P[s]) return s;
  var list=(navigator.languages&&navigator.languages.length)?navigator.languages:[navigator.language||'en'];
  for(var i=0;i<list.length;i++){var c=String(list[i]||'').toLowerCase().split('-')[0];
    if(c==='iw')c='he'; if(P[c])return c;}
  return 'en';
}
var L=pick(), t=P[L];
document.documentElement.lang=L;
if(L==='he')document.documentElement.dir='rtl';
document.title=t.title;
document.getElementById('p-h').textContent=t.h;
document.getElementById('p-upd').textContent=t.upd;
var b=document.getElementById('body');
t.s.forEach(function(x){
  var s=document.createElement('section');
  var h=document.createElement('h2'); h.textContent=x[0];
  var p=document.createElement('p'); p.textContent=x[1];
  s.appendChild(h); s.appendChild(p); b.appendChild(s);
});
document.getElementById('back').textContent=t.back;
document.getElementById('back').href=HOME[L];
document.getElementById('home1').href=HOME[L];
</script>
