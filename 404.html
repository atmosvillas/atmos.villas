*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--f);font-weight:500;

.brand{display:flex;align-items:center}
.logo{height:22px;width:auto;display:block}
.lg-mark{fill:var(--gold)}.lg-text{fill:var(--ink)}
main{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:16px 20px 56px}
.box{width:100%;max-width:760px;text-align:center}
.code{font-size:clamp(72px,17vw,132px);font-weight:800;line-height:.9;letter-spacing:-.02em;
 background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0}
h1{font-size:clamp(23px,4.4vw,36px);font-weight:800;margin:16px 0 0;letter-spacing:-.01em}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:15px 26px;border-radius:10px;
 font-family:var(--f);font-size:14px;font-weight:800;cursor:pointer;border:0;transition:.25s;letter-spacing:.01em}
.btn-wa{background:#25D366;color:#fff;box-shadow:0 10px 28px rgba(37,211,102,.28)}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(37,211,102,.38)}
.btn-line{border:1px solid var(--line);color:var(--muted2);background:transparent}
.btn-line:hover{border-color:var(--gold);color:var(--ink)}
.btn-gold{background:var(--grad);color:#1a1206}
.btn-gold:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.6;cursor:default;transform:none}
.mail{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:9px 16px;border-radius:30px;
 border:1px solid var(--line2);color:var(--muted);font-size:12.5px;cursor:pointer;transition:.22s;background:transparent;font-family:var(--f)}
.mail:hover{border-color:var(--gold);color:var(--ink)}
.divider{display:flex;align-items:center;gap:16px;margin:44px auto 0;max-width:430px;color:var(--muted);
 font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line2)}
form{position:relative;margin:22px auto 0;max-width:430px;display:grid;gap:14px;text-align:left;
 background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px}
label{display:grid;gap:7px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
input[type=text],input[type=tel]{background:#0E100E;border:1px solid var(--line2);border-radius:9px;padding:14px 15px;
 color:var(--ink);font-family:var(--f);font-size:15.5px;font-weight:500;letter-spacing:0;text-transform:none;transition:.22s;width:100%}
input::placeholder{color:#6b665e}
input:focus{outline:none;border-color:var(--gold);background:#121412}
input.bad{border-color:#c9564f}
fieldset{border:0;padding:0;margin:0}
legend{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;padding:0}
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.how label{margin:0;cursor:pointer}
.how input{position:absolute;opacity:0;pointer-events:none}
.how span{display:flex;align-items:center;justify-content:center;padding:12px 4px;border:1px solid var(--line2);
 border-radius:9px;background:#0E100E;font-size:13px;font-weight:600;color:var(--muted2);transition:.2s;
 letter-spacing:0;text-transform:none;text-align:center}
.how input:checked+span{background:var(--grad);color:#1a1206;border-color:transparent;font-weight:800}
.hp{position:absolute!important;top:0;left:0;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
 clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;border:0;opacity:0;pointer-events:none}
.msg{display:none;font-size:13.5px;line-height:1.6;padding:12px 14px;border-radius:9px;text-align:center}
.msg.show{display:block}
.msg.ok{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.35);color:#8ee9b4}
.msg.err{background:rgba(201,86,79,.1);border:1px solid rgba(201,86,79,.35);color:#e8a49f}
.msg a{display:inline-block;margin-top:6px;color:#25D366;font-weight:800}
.note{font-size:11px;color:#6b665e;line-height:1.55;text-align:center;margin:0}
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);background:var(--card);
 border:1px solid var(--gold);color:var(--ink);padding:12px 22px;border-radius:30px;font-size:13px;font-weight:700;
 opacity:0;pointer-events:none;transition:.3s;z-index:99}
.toast.show{opacity:1;transform:translate(-50%,0)}
html[dir=rtl] body{direction:rtl}
html[dir=rtl] form{text-align:right}
html[dir=rtl] input{text-align:right}
html[dir=rtl] input[type=tel]{direction:ltr;text-align:right}
html[dir=rtl] .code{direction:ltr}
@media(max-width:560px){
 form{padding:20px}
 .how{grid-template-columns:1fr}
 .acts .btn{width:100%}
}

/* какой язык показать: ручной выбор -> язык браузера -> английский */
function pick(){
  var s=null; try{s=localStorage.getItem('atmos_lang');}catch(e){}
  if(s&&T[s]) return s;
  var list=(navigator.languages&&navigator.languages.length)?navigator.languages:[navigator.language||'en'];
  for(var i=0;i<list.length;i++){
    var c=String(list[i]||'').toLowerCase().split('-')[0];
    if(c==='iw') c='he';
    if(T[c]) return c;
  }
  return 'en';
}
var L=pick(), t=T[L];
document.documentElement.lang=L;
if(L==='he') document.documentElement.dir='rtl';
document.title=t.title;
function set(id,v){var e=document.getElementById(id); if(e) e.textContent=v;}
set('t-h',t.h); set('t-sub',t.sub); set('t-wa',t.wa); set('t-home',t.home); set('t-mail',t.mail);
set('t-fh',t.fh); set('t-name',t.name); set('t-phone',t.phone); set('t-how',t.how); set('t-call',t.call);
set('t-note',t.note); set('send',t.send);
var PL={"en":"Privacy Policy","ru":"Политика конфиденциальности","uk":"Політика конфіденційності","de":"Datenschutzerklärung","fr":"Politique de confidentialité","es":"Política de privacidad","he":"מדיניות פרטיות"};

/* копирование почты */
function toast(m){var ts=document.getElementById('toast');ts.textContent=m;ts.classList.add('show');
  setTimeout(function(){ts.classList.remove('show')},2200);}
document.getElementById('mail').addEventListener('click',function(){
  var v=this.getAttribute('data-mail');
  function legacy(){var ta=document.createElement('textarea');ta.value=v;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();var ok=false;try{ok=document.execCommand('copy')}catch(e){}
    document.body.removeChild(ta);return ok;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(v).then(function(){toast(t.copied)})['catch'](function(){legacy()?toast(t.copied):(location.href='mailto:'+v)});
  } else { legacy()?toast(t.copied):(location.href='mailto:'+v); }
});

/* пиксель: клик по WhatsApp */
document.getElementById('wa').addEventListener('click',function(){
  try{if(window.fbq)fbq('track','Contact',{content_name:'404 page',content_category:'WhatsApp',content_ids:[L]});}catch(e){}
});

/* форма -> тот же Cloudflare Worker */
var f=document.getElementById('f'), msg=document.getElementById('msg'), btn=document.getElementById('send');
function show(k,html){msg.className='msg show '+k;msg.innerHTML=html;}
function fail(){show('err', t.err+'<br><a href="'+document.getElementById('wa').href+'" target="_blank" rel="noopener">'+t.wa+' \u2192</a>');}
f.addEventListener('submit',function(e){
  e.preventDefault();
  var n=f.name.value.trim(), p=f.phone.value.trim();
  f.name.classList.toggle('bad',!n); f.phone.classList.toggle('bad',!p);
  if(!n||!p){ (!n?f.name:f.phone).focus(); return; }
  var ep=window.ATMOS_FORM_ENDPOINT||'';
  if(!ep){ fail(); return; }
  var how=(f.querySelector('input[name=how]:checked')||{}).value||'';
  btn.disabled=true; btn.textContent=t.sending; msg.className='msg';
  fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:n,phone:p,how:how,lang:L,page:location.href,website:f.website.value})})
  .then(function(r){return r.json().catch(function(){return {ok:r.ok}})})
  .then(function(d){
    if(d&&d.ok){ show('ok',t.ok);
      try{if(window.fbq)fbq('track','Lead',{content_name:'404 form',content_category:how,content_ids:[L]});}catch(e){}
      f.reset();
    } else { fail(); }
  })
  .catch(function(){ fail(); })
  .then(function(){ btn.disabled=false; btn.textContent=t.send; });
});
